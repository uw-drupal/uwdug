      - migrate_uwdrupal
id: dug_d7_node_complete_page
class: Drupal\node\Plugin\migrate\D7NodeTranslation
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Content
  - content
  - node
  - n_page
migration_group: dug
label: 'Node complete (Basic page)'
source:
  plugin: d7_node_complete
  node_type: page
