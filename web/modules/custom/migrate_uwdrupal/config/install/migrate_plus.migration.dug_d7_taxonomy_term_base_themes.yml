langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_taxonomy_term_base_themes
class: Drupal\migrate\Plugin\Migration
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Content
  - content
  - terms
  - t_theme
migration_group: dug
label: 'Taxonomy terms (Base Themes)'
source:
  plugin: d7_taxonomy_term
  bundle: base_themes
process:
  tid:
    -
      plugin: get
      source: tid
  revision_id:
    -
      plugin: get
      source: tid
  vid:
    -
      plugin: migration_lookup
      migration: dug_d7_taxonomy_vocabulary
      source: vid
  name:
    -
      plugin: get
      source: name
  description/value:
    -
      plugin: get
      source: description
  description/format:
    -
      plugin: get
      source: format
  weight:
    -
      plugin: get
      source: weight
  parent_id:
    -
      plugin: skip_on_empty
      method: process
      source: parent
    -
      plugin: migration_lookup
      migration:
        - dug_d7_taxonomy_term_tags
        - dug_d7_taxonomy_term_audiences
        - dug_d7_taxonomy_term_drupal_versions
        - dug_d7_taxonomy_term_type
        - dug_d7_taxonomy_term_base_themes
  parent:
    -
      plugin: default_value
      default_value: 0
      source: '@parent_id'
  changed:
    -
      plugin: get
      source: timestamp
  langcode:
    -
      plugin: get
      source: language
destination:
  plugin: 'entity:taxonomy_term'
  default_bundle: base_themes
idMap: {  }
migration_dependencies:
  required:
    - dug_d7_taxonomy_vocabulary
  optional:
    - dug_d7_field_instance
    - dug_d7_taxonomy_vocabulary
include: null
