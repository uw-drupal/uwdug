langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_node_title_label
class: Drupal\migrate\Plugin\Migration
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Configuration
  - config
  - node_title
migration_group: dug
label: 'Node title label'
source:
  plugin: d7_node_type
  constants:
    entity_type: node
    field_name: title
process:
  label:
    -
      plugin: static_map
      source: title_label
      bypass: true
      map:
        Title: 0
    -
      plugin: skip_on_empty
      method: row
  entity_type:
    -
      plugin: get
      source: constants/entity_type
  bundle:
    # -
    #   plugin: get
    #   source: type
    -
      plugin: skip_on_value
      source: type
      equals: true
      value:
        - 'webform'
      method: row
      message: 'Skipped webform node type.'
    -
      plugin: static_map
      bypass: true
      map:
        showcase_item_: showcase_item
  field_name:
    -
      plugin: get
      source: constants/field_name
destination:
  plugin: 'entity:base_field_override'
idMap: {  }
migration_dependencies:
  required:
    - dug_d7_node_type
  optional: {  }
include: null
