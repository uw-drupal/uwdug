langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_node_complete_wiki_page
class: Drupal\node\Plugin\migrate\D7NodeTranslation
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Content
  - content
  - node
  - n_wiki
migration_group: dug
label: 'Node complete (Wiki page)'
source:
  plugin: d7_node_complete
  node_type: wiki_page
  constants:
    langcode: en
    revision_translation_affected: true
process:
  nid:
    -
      plugin: get
      source: tnid
  # vid:
  #   -
  #     plugin: get
  #     source: vid
  langcode: constants/langcode
    # -
    #   plugin: default_value
    #   source: language
    #   default_value: und
  title:
    -
      plugin: get
      source: title
  uid:
    -
      plugin: get
      source: node_uid
  status:
    -
      plugin: get
      source: status
  created:
    -
      plugin: get
      source: created
  changed:
    -
      plugin: get
      source: timestamp
  promote:
    -
      plugin: get
      source: promote
  sticky:
    -
      plugin: get
      source: sticky
  revision_uid:
    -
      plugin: get
      source: revision_uid
  revision_log:
    -
      plugin: get
      source: log
  revision_timestamp:
    -
      plugin: get
      source: timestamp
  revision_translation_affected: constants/revision_translation_affected
  content_translation_source:
    -
      plugin: get
      source: source_langcode
  comment_node_wiki_page/0/status:
    -
      plugin: get
      source: comment
  body:
    -
      plugin: get
      source: body
  field_tags:
    -
      plugin: sub_process
      source: field_tags
      process:
        target_id: tid
  field_drupal_version:
    -
      plugin: sub_process
      source: field_drupal_version
      process:
        target_id: tid
  field_image:
    -
      plugin: sub_process
      source: field_image
      process:
        target_id: fid
        alt: alt
        title: title
        width: width
        height: height
  field_file:
    -
      plugin: sub_process
      source: field_file
      process:
        target_id: fid
        display: display
        description: description
destination:
  plugin: 'entity_complete:node'
  translations: true
  default_bundle: wiki_page
idMap: {  }
migration_dependencies:
  required:
    - dug_d7_user
    - dug_d7_node_type
  optional:
    - dug_d7_field_instance
include: null
