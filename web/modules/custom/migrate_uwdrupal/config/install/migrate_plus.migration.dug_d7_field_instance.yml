langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_field_instance
class: Drupal\migrate_drupal\Plugin\migrate\FieldMigration
field_plugin_method: alterFieldInstanceMigration
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Configuration
  - config
  - field
migration_group: dug
label: 'Field instance configuration'
source:
  plugin: d7_field_instance
  constants:
    status: true
    comment_node: comment_node_
    translatable: true
process:
  type:
    -
      plugin: process_field
      source: type
      method: getFieldType
  entity_type:
    # -
    #   plugin: get
    #   source: entity_type
    -
      plugin: skip_on_value
      source: entity_type
      equals: true
      value:
        - 'entityform'
      method: row
      message: 'Skipped entityform fields.'
  field_name:
    -
      plugin: get
      source: field_name
  bundle_mapped:
    -
      plugin: static_map
      source: bundle
      bypass: true
      map:
        comment_node_forum: comment_forum
        showcase_item_: showcase_item
  _comment_type:
    -
      plugin: explode
      source: bundle
      delimiter: comment_node_
    -
      plugin: extract
      index:
        - 1
      default: false
    -
      plugin: skip_on_empty
      method: process
    -
      plugin: migration_lookup
      migration: {  }
  bundle:
    -
      plugin: field_bundle
      source:
        - entity_type
        - '@bundle_mapped'
  label:
    -
      plugin: get
      source: label
  description:
    -
      plugin: get
      source: description
  required:
    -
      plugin: get
      source: required
  status:
    -
      plugin: get
      source: constants/status
  allowed_values:
    -
      plugin: sub_process
      source: allowed_vid
      process:
        -
          plugin: migration_lookup
          migration: dug_d7_taxonomy_vocabulary
          source: vid
  settings:
    -
      plugin: d7_field_instance_settings
      source:
        - settings
        - widget
        - field_definition
  default_value_function:
    -
      plugin: get
      source: ''
  default_value:
    -
      plugin: d7_field_instance_defaults
      source:
        - default_value
        - widget
  translatable:
    -
      plugin: get
      source: constants/translatable
      # source: translatable
  settings/title:
    -
      plugin: static_map
      source: settings/title
      bypass: true
      map:
        disabled: 0
        optional: 1
        required: 2
destination:
  plugin: 'entity:field_config'
idMap: {  }
migration_dependencies:
  required:
    - dug_d7_field
    - dug_d7_node_type
  optional: {  }
    # - dug_d7_taxonomy_vocabulary
include: null
