langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_user
class: Drupal\user\Plugin\migrate\User
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Content
  - content
  - user
migration_group: dug
label: 'User accounts'
source:
#  plugin: d7_user
  plugin: d7_shibboleth_user
process:
  uid:
    # -
    #   plugin: get
    #   source: uid
    -
      plugin: skip_on_value
      equals: true
      source: uid
      method: row
      value:
        - 1 # uwdrupal (1)
  shibboleth_authname: shibboleth_authname
  name:
    -
      plugin: get
      source: name
  pass:
    -
      plugin: get
      source: pass
  mail:
    -
      plugin: get
      source: mail
  created:
    -
      plugin: get
      source: created
  access:
    -
      plugin: get
      source: access
  login:
    -
      plugin: get
      source: login
  status:
    -
      plugin: get
      source: status
  timezone:
    -
      plugin: get
      source: timezone
  langcode:
    -
      plugin: user_langcode
      source: entity_language
      fallback_to_site_default: false
  preferred_langcode:
    -
      plugin: user_langcode
      source: language
      fallback_to_site_default: true
  preferred_admin_langcode:
    -
      plugin: user_langcode
      source: language
      fallback_to_site_default: true
  init:
    -
      plugin: get
      source: init
  roles:
    # -
    #   plugin: migration_lookup
    #   migration: dug_d7_user_role
    #   source: roles
    -
      plugin: static_map
      bypass: true
      source: roles
      map:
        3: 'administrator'
        4: 'builder'
        5: 'content_editor' # record transmittal manager
        6: 'contributor' # content admin
  # user_picture:
  #   -
  #     plugin: default_value
  #     source: picture
  #     default_value: null
  #   -
  #     plugin: migration_lookup
  #     migration: dug_d7_file
destination:
  plugin: 'entity:user'
idMap: {  }
migration_dependencies:
  required: {  }
    # - dug_d7_user_role
  optional: {  }
    # - dug_d7_field_instance
    # - dug_d7_file
    # - dug_user_picture_field_instance
    # - dug_user_picture_entity_display
    # - dug_user_picture_entity_form_display
    # - dug_d7_user_role
include: null
