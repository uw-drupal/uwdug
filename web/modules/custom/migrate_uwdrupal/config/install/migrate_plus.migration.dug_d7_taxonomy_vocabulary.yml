langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_taxonomy_vocabulary
class: Drupal\migrate\Plugin\Migration
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Configuration
  - config
  - vocabs
migration_group: dug
label: 'Taxonomy vocabularies'
# Rollback: deletes vocabularies it created. No changes to other vocabs.
source:
  plugin: d7_taxonomy_vocabulary
process:
  vid:
    -
      plugin: make_unique_entity_field
      source: machine_name
      entity_type: taxonomy_vocabulary
      field: vid
      length: 30
      migrated: true
  label:
    -
      plugin: get
      source: name
  name:
    -
      plugin: get
      source: name
  description:
    -
      plugin: get
      source: description
  weight:
    -
      plugin: get
      source: weight
destination:
  plugin: 'entity:taxonomy_vocabulary'
idMap: {  }
migration_dependencies:
  required: {  }
  optional: {  }
include: null
