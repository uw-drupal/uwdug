langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_file
class: Drupal\migrate\Plugin\Migration
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Content
  - content
  - file
migration_group: dug
label: 'Public files'
source:
  plugin: d7_file
  scheme: public
  constants:
    source_base_path: /data/www/facweb23.s.uw.edu/uwdrupal/sites/default/files/
process:
  fid:
    -
      plugin: get
      source: fid
  filename:
    -
      plugin: get
      source: filename
  source_full_path:
    -
      plugin: concat
      delimiter: /
      source:
        - constants/source_base_path
        - filepath
    -
      plugin: urlencode
  uri:
    -
      plugin: file_copy
      source:
        - '@source_full_path'
        - uri
  filemime:
    -
      plugin: get
      source: filemime
  status:
    -
      plugin: get
      source: status
  created:
    -
      plugin: get
      source: timestamp
  changed:
    -
      plugin: get
      source: timestamp
  uid:
    -
      plugin: get
      source: uid
destination:
  plugin: 'entity:file'
idMap: {  }
migration_dependencies:
  required: {  }
  optional: {  }
include: null
