langcode: en
status: true
dependencies:
  enforced:
    module:
      - migrate_uwdrupal
id: dug_d7_view_modes
class: Drupal\migrate\Plugin\Migration
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - 'Drupal 7'
  - Configuration
  - config
migration_group: dug
label: 'View modes'
# Rollback: DOES delete previously existing, modified view modes as well as the ones it creates.
source:
  plugin: d7_view_mode
process:
  mode:
    -
      plugin: skip_on_value
      source: view_mode
      equals: true
      value:
        - 'diff_standard'
      method: row
      message: 'Skipped diff_standard view mode.'
    -
      plugin: static_map
      # source: view_mode
      bypass: true
      map:
        default: full
        revision: diff
  label:
    -
      plugin: static_map
      source: view_mode
      bypass: true
      map:
        search_index: 'Search index'
        search_result: 'Search result'
        rss: RSS
        print: Print
        teaser: Teaser
        full: Full
        default: Full
        revision: 'Revision comparison'
  targetEntityType:
    -
      plugin: skip_on_value
      source: entity_type
      equals: true
      value:
        - 'entityform'
      method: row
      message: 'Skipped entityform fields.'
    -
      plugin: get
      source: entity_type
destination:
  plugin: 'entity:entity_view_mode'
idMap: {  }
migration_dependencies:
  required: {  }
  optional: {  }
include: null
