id: views_exposed_form
label: 'Views exposed form'
code: |-
  .views-exposed-form .checkbox input[type="checkbox"] {
    left:0;
    width:0;
    height:0
  }
  .views-exposed-form {
    font-family:'Encode Sans Compressed',sans-serif;
    background-color:#ECE9E2;
    padding:10px;
    border-color:#d3d3d3;
    width:90%;
    margin:0 auto;
    margin-top:18px;
    margin-bottom:18px;
    text-align:center;
    
    &:after {
    	display: block;
    	clear: both;
    	content: "";
    }
    
  	fieldset.form-group {
  		/*display: inline-block;*/
  		float: left;
    	padding: .5em 1em 0 0;
  	  margin: 0 auto 20px;
  	  width: 32%;
  	  
  	  
  	  .checkbox,
  		span.icons {
  		  display:none;
  		  padding:0;
  		}
  		.btn-info {
  		  background-color:#4b2f92;
  		}
  		label {
  		  font-size:18px;
  		  font-family:#4b2f92
  		}
  		.form-item {
  		  display:inline-block;
  		  margin-top:0
  		}
  	}
  }
